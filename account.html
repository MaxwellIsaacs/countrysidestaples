<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account — Countryside Staples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F3EF;
  --bg-warm: #EEEAE4;
  --text: #1C1A17;
  --muted: #8A8378;
  --border: rgba(28, 26, 23, 0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

::selection { background: var(--text); color: var(--bg); }
a { color: inherit; text-decoration: none; }
img { display: block; }

/* ── NAV ── */
nav {
  width: 100%;
  padding: 0 48px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
}

nav a img { height: 32px; }

/* ── AUTH ── */
.auth {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
}

.auth-card {
  width: 100%;
  max-width: 380px;
}

.auth-card h1 {
  font-family: 'EB Garamond', serif;
  font-size: 32px;
  font-weight: 400;
  text-align: center;
  margin-bottom: 8px;
}

.auth-card h1 em { font-style: italic; }

.auth-card .auth-sub {
  text-align: center;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  margin-bottom: 36px;
}

/* Social buttons */
.social-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
}

.social-btn {
  width: 100%;
  height: 48px;
  border: 1px solid rgba(28,26,23,0.1);
  background: #fff;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: border-color 0.2s, background 0.2s;
}

.social-btn:hover {
  border-color: rgba(28,26,23,0.25);
  background: #fafafa;
}

.social-btn svg {
  width: 18px;
  height: 18px;
}

/* Divider */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}

.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.auth-divider span {
  font-size: 11px;
  font-weight: 400;
  color: rgba(28,26,23,0.25);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Form */
.auth-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.auth-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.auth-field label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

.auth-field input {
  height: 46px;
  border: 1px solid rgba(28,26,23,0.1);
  background: #fff;
  padding: 0 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.auth-field input:focus {
  border-color: var(--text);
}

.auth-field input::placeholder { color: rgba(28,26,23,0.2); }

.auth-submit {
  width: 100%;
  height: 48px;
  background: var(--text);
  color: var(--bg);
  border: none;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
  transition: opacity 0.3s;
}

.auth-submit:hover { opacity: 0.85; }

.auth-toggle {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
}

.auth-toggle a {
  color: var(--text);
  font-weight: 400;
  border-bottom: 1px solid rgba(28,26,23,0.15);
  transition: border-color 0.2s;
}

.auth-toggle a:hover { border-color: var(--text); }

/* Tab toggle */
.auth-tabs {
  display: flex;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.auth-tab {
  flex: 1;
  padding: 12px 0;
  text-align: center;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: 'Outfit', sans-serif;
}

.auth-tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* Panels */
.auth-panel { display: none; }
.auth-panel.active { display: block; }

@media (max-width: 640px) {
  nav { padding: 0 20px; }
  nav a img { height: 24px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html"><img src="https://countrysidestaples.com/cdn/shop/files/6_by_150_logo.png?v=1748844280&width=500" alt="Countryside Staples"></a>
</nav>

<div class="auth">
  <div class="auth-card">
    <h1>Welcome <em>back</em></h1>
    <p class="auth-sub">Sign in to your account or create a new one</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- SIGN IN -->
    <div class="auth-panel active" id="signinPanel">
      <div class="social-btns">
        <button class="social-btn" onclick="alert('Google sign-in coming soon')">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="social-btn" onclick="alert('Apple sign-in coming soon')">
          <svg viewBox="0 0 24 24" fill="var(--text)"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.13 4.52-3.74 4.25z"/></svg>
          Continue with Apple
        </button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <form class="auth-form" onsubmit="event.preventDefault();">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" placeholder="you@example.com">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" placeholder="Enter your password">
        </div>
        <button class="auth-submit" type="submit">Sign In</button>
      </form>
    </div>

    <!-- SIGN UP -->
    <div class="auth-panel" id="signupPanel">
      <div class="social-btns">
        <button class="social-btn" onclick="alert('Google sign-up coming soon')">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="social-btn" onclick="alert('Apple sign-up coming soon')">
          <svg viewBox="0 0 24 24" fill="var(--text)"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.13 4.52-3.74 4.25z"/></svg>
          Continue with Apple
        </button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <form class="auth-form" onsubmit="event.preventDefault();">
        <div class="auth-field">
          <label>First Name</label>
          <input type="text" placeholder="First name">
        </div>
        <div class="auth-field">
          <label>Last Name</label>
          <input type="text" placeholder="Last name">
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" placeholder="you@example.com">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" placeholder="Create a password">
        </div>
        <button class="auth-submit" type="submit">Create Account</button>
      </form>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
  if (tab === 'signin') {
    document.querySelector('.auth-tab:first-child').classList.add('active');
    document.getElementById('signinPanel').classList.add('active');
  } else {
    document.querySelector('.auth-tab:last-child').classList.add('active');
    document.getElementById('signupPanel').classList.add('active');
  }
}
</script>
</body>
</html>
