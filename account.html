<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account — Countryside Staples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F3EF;
  --bg-warm: #EEEAE4;
  --text: #1C1A17;
  --muted: #8A8378;
  --border: rgba(28, 26, 23, 0.08);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

::selection { background: var(--text); color: var(--bg); }
a { color: inherit; text-decoration: none; }
img { display: block; }

/* ── NAV ── */
nav {
  width: 100%;
  padding: 0 48px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

nav .nav-back {
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
  width: 80px;
}

nav .nav-back:hover { color: var(--text); }

nav .nav-back svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  stroke-width: 1.4;
  fill: none;
}

nav .nav-logo img { height: 32px; }
nav .nav-spacer { width: 80px; }

/* ── AUTH ── */
.auth {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
}

.auth-card {
  width: 100%;
  max-width: 380px;
}

.auth-card h1 {
  font-family: 'EB Garamond', serif;
  font-size: 32px;
  font-weight: 400;
  text-align: center;
  margin-bottom: 8px;
}

.auth-card h1 em { font-style: italic; }

.auth-card .auth-sub {
  text-align: center;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  margin-bottom: 36px;
}

/* Social buttons */
.social-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
}

.social-btn {
  width: 100%;
  height: 48px;
  border: 1px solid rgba(28,26,23,0.1);
  background: #fff;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: border-color 0.2s, background 0.2s;
}

.social-btn:hover {
  border-color: rgba(28,26,23,0.25);
  background: #fafafa;
}

.social-btn svg {
  width: 18px;
  height: 18px;
}

/* Divider */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}

.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.auth-divider span {
  font-size: 11px;
  font-weight: 400;
  color: rgba(28,26,23,0.25);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Form */
.auth-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.auth-field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.auth-field label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

.auth-field input {
  height: 46px;
  border: 1px solid rgba(28,26,23,0.1);
  background: #fff;
  padding: 0 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.auth-field input:focus {
  border-color: var(--text);
}

.auth-field input::placeholder { color: rgba(28,26,23,0.2); }

.auth-submit {
  width: 100%;
  height: 48px;
  background: var(--text);
  color: var(--bg);
  border: none;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
  transition: opacity 0.3s;
}

.auth-submit:hover { opacity: 0.85; }

.auth-toggle {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
}

.auth-toggle a {
  color: var(--text);
  font-weight: 400;
  border-bottom: 1px solid rgba(28,26,23,0.15);
  transition: border-color 0.2s;
}

.auth-toggle a:hover { border-color: var(--text); }

/* Tab toggle */
.auth-tabs {
  display: flex;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.auth-tab {
  flex: 1;
  padding: 12px 0;
  text-align: center;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: 'Outfit', sans-serif;
}

.auth-tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* Panels */
.auth-panel { display: none; }
.auth-panel.active { display: block; }

/* Error message */
.auth-error {
  margin-top: 12px;
  font-size: 12px;
  color: #8C4A4A;
  text-align: center;
  display: none;
}

/* ── LOGGED IN STATE ── */
.account-view { display: none; }
.account-view.visible { display: block; }

.account-header {
  text-align: center;
  margin-bottom: 40px;
}

.account-header h1 {
  font-family: 'EB Garamond', serif;
  font-size: 32px;
  font-weight: 400;
  margin-bottom: 4px;
}

.account-header h1 em { font-style: italic; }

.account-header .account-email {
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
}

.account-section {
  margin-bottom: 32px;
}

.account-section h3 {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.order-card {
  border: 1px solid var(--border);
  background: #fff;
  padding: 18px 20px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.order-card .oc-left .oc-id {
  font-size: 13px;
  font-weight: 400;
}

.order-card .oc-left .oc-date {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.order-card .oc-right {
  text-align: right;
}

.order-card .oc-right .oc-total {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
}

.order-card .oc-right .oc-status {
  display: inline-block;
  margin-top: 4px;
  padding: 2px 8px;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 3px;
}

.oc-status-new { background: rgba(74,124,89,0.08); color: #4A7C59; }
.oc-status-processing { background: rgba(184,134,11,0.08); color: #B8860B; }
.oc-status-shipped { background: rgba(74,106,140,0.08); color: #4A6A8C; }
.oc-status-delivered { background: rgba(28,26,23,0.05); color: var(--muted); }
.oc-status-cancelled { background: rgba(140,74,74,0.08); color: #8C4A4A; }

.no-orders {
  text-align: center;
  padding: 32px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 300;
}

.btn-signout {
  display: block;
  width: 100%;
  padding: 14px;
  background: none;
  border: 1px solid rgba(28,26,23,0.1);
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  transition: all 0.2s;
  text-align: center;
}

.btn-signout:hover { color: var(--text); border-color: var(--text); }

@media (max-width: 640px) {
  nav { padding: 0 20px; }
  nav .nav-logo img { height: 24px; }
  nav .nav-back { font-size: 0; width: 32px; }
  nav .nav-back svg { width: 18px; height: 18px; }
  nav .nav-spacer { width: 32px; }
}
</style>
</head>
<body>

<nav>
  <a href="javascript:history.back()" class="nav-back"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back</a>
  <a href="index.html" class="nav-logo"><img src="https://countrysidestaples.com/cdn/shop/files/6_by_150_logo.png?v=1748844280&width=500" alt="Countryside Staples"></a>
  <div class="nav-spacer"></div>
</nav>

<!-- AUTH VIEW -->
<div class="auth" id="authView">
  <div class="auth-card">
    <h1>Welcome <em>back</em></h1>
    <p class="auth-sub">Sign in to your account or create a new one</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- SIGN IN -->
    <div class="auth-panel active" id="signinPanel">
      <form class="auth-form" id="signinForm">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="si-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="si-password" placeholder="Enter your password" required>
        </div>
        <button class="auth-submit" type="submit">Sign In</button>
      </form>
      <div class="auth-error" id="signinError"></div>
    </div>

    <!-- SIGN UP -->
    <div class="auth-panel" id="signupPanel">
      <form class="auth-form" id="signupForm">
        <div class="auth-field">
          <label>First Name</label>
          <input type="text" id="su-first" placeholder="First name" required>
        </div>
        <div class="auth-field">
          <label>Last Name</label>
          <input type="text" id="su-last" placeholder="Last name" required>
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="su-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="su-password" placeholder="Create a password (6+ characters)" required minlength="6">
        </div>
        <button class="auth-submit" type="submit">Create Account</button>
      </form>
      <div class="auth-error" id="signupError"></div>
    </div>
  </div>
</div>

<!-- LOGGED IN VIEW -->
<div class="auth" id="accountView" style="display:none;">
  <div class="auth-card" style="max-width:440px;">
    <div class="account-header">
      <h1 id="accountGreeting">Your <em>Account</em></h1>
      <div class="account-email" id="accountEmail"></div>
    </div>

    <div class="account-section">
      <h3>Your Orders</h3>
      <div id="ordersList"></div>
    </div>

    <button class="btn-signout" id="signoutBtn">Sign Out</button>
  </div>
</div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Something went wrong');
  return data;
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.auth-error').forEach(e => e.style.display = 'none');
  if (tab === 'signin') {
    document.querySelector('.auth-tab:first-child').classList.add('active');
    document.getElementById('signinPanel').classList.add('active');
  } else {
    document.querySelector('.auth-tab:last-child').classList.add('active');
    document.getElementById('signupPanel').classList.add('active');
  }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

function showAuth() {
  document.getElementById('authView').style.display = 'flex';
  document.getElementById('accountView').style.display = 'none';
}

function showAccount(customer) {
  document.getElementById('authView').style.display = 'none';
  document.getElementById('accountView').style.display = 'flex';
  const name = [customer.first_name, customer.last_name].filter(Boolean).join(' ');
  document.getElementById('accountGreeting').innerHTML = name ? `Hi, <em>${name}</em>` : 'Your <em>Account</em>';
  document.getElementById('accountEmail').textContent = customer.email;
  loadOrders();
}

async function loadOrders() {
  try {
    const orders = await api('/api/account/orders');
    const el = document.getElementById('ordersList');
    if (!orders.length) {
      el.innerHTML = '<div class="no-orders">No orders yet</div>';
      return;
    }
    el.innerHTML = orders.map(o => {
      const date = new Date(o.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return `<div class="order-card">
        <div class="oc-left">
          <div class="oc-id">Order #${o.id}</div>
          <div class="oc-date">${date}</div>
        </div>
        <div class="oc-right">
          <div class="oc-total">$${(o.total_cents / 100).toFixed(2)}</div>
          <span class="oc-status oc-status-${o.status}">${o.status}</span>
        </div>
      </div>`;
    }).join('');
  } catch {
    document.getElementById('ordersList').innerHTML = '<div class="no-orders">Could not load orders</div>';
  }
}

// Sign in
document.getElementById('signinForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const data = await api('/api/account/login', {
      method: 'POST',
      body: { email: document.getElementById('si-email').value, password: document.getElementById('si-password').value },
    });
    showAccount(data.customer);
  } catch (err) {
    showError('signinError', err.message);
  }
});

// Sign up
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const data = await api('/api/account/signup', {
      method: 'POST',
      body: {
        first_name: document.getElementById('su-first').value,
        last_name: document.getElementById('su-last').value,
        email: document.getElementById('su-email').value,
        password: document.getElementById('su-password').value,
      },
    });
    showAccount(data.customer);
  } catch (err) {
    showError('signupError', err.message);
  }
});

// Sign out
document.getElementById('signoutBtn').addEventListener('click', async () => {
  await api('/api/account/logout', { method: 'POST' });
  showAuth();
});

// Check if already logged in
api('/api/account/me').then(showAccount).catch(showAuth);
</script>
</body>
</html>
