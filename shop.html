<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop All — Countryside Staples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F3EF;
  --bg-warm: #EEEAE4;
  --text: #1C1A17;
  --muted: #8A8378;
  --accent: #9C8B72;
  --border: rgba(28, 26, 23, 0.08);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

::selection { background: var(--text); color: var(--bg); }
a { color: inherit; text-decoration: none; }
img { display: block; }

/* ── NAV ── */
nav {
  position: sticky;
  top: 0;
  width: 100%;
  z-index: 100;
  padding: 0 48px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(246,243,239,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}

.nav-menu-toggle {
  position: fixed; top: 16px; left: 48px;
  width: 32px; height: 32px;
  display: block; cursor: pointer; background: none; border: none;
  padding: 0; color: var(--text); z-index: 500;
}
.nav-menu-toggle-spacer { width: 32px; height: 32px; }
@media (max-width: 768px) { .nav-menu-toggle { left: 20px; } }
.nav-menu-toggle svg { width: 20px; height: 20px; stroke: var(--text); stroke-width: 1.4; fill: none; display: block; margin: 6px; }
.nav-menu-toggle svg line { transform-origin: 12px 12px; transition: transform 0.4s cubic-bezier(.2,.7,.2,1); }
.nav-menu-toggle.open svg line.h, .nav-menu-toggle.open svg line.v { transform: rotate(45deg); }

.nav-overlay {
  position: fixed; inset: 0;
  background: var(--bg); z-index: 240;
  padding: 120px 48px 48px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.35s ease, visibility 0.35s ease;
  overflow-y: auto;
}
.nav-overlay.open { opacity: 1; visibility: visible; }
.nav-overlay-inner { display: flex; flex-direction: column; gap: 4px; max-width: 1400px; }
.nav-overlay a {
  font-family: 'EB Garamond', serif;
  font-size: clamp(28px, 3.6vw, 44px);
  font-weight: 400; line-height: 1.15; color: var(--text);
  padding: 4px 0;
  transition: opacity 0.2s, transform 0.45s cubic-bezier(.2,.7,.2,1), letter-spacing 0.3s;
  opacity: 0; transform: translateY(12px);
  letter-spacing: -0.01em; width: max-content; max-width: 100%;
}
.nav-overlay a em { font-style: italic; color: rgba(28,26,23,0.55); font-weight: 400; }
.nav-overlay a:hover { letter-spacing: 0.005em; opacity: 0.6; }
.nav-overlay.open a { opacity: 1; transform: translateY(0); }
.nav-overlay.open a:nth-child(1)  { transition-delay: 0.05s; }
.nav-overlay.open a:nth-child(2)  { transition-delay: 0.09s; }
.nav-overlay.open a:nth-child(3)  { transition-delay: 0.13s; }
.nav-overlay.open a:nth-child(4)  { transition-delay: 0.17s; }
.nav-overlay.open a:nth-child(5)  { transition-delay: 0.21s; }
.nav-overlay.open a:nth-child(6)  { transition-delay: 0.25s; }
.nav-overlay.open a:nth-child(7)  { transition-delay: 0.29s; }
.nav-overlay.open a:nth-child(8)  { transition-delay: 0.33s; }
.nav-overlay.open a:nth-child(9)  { transition-delay: 0.37s; }
.nav-overlay.open a:nth-child(10) { transition-delay: 0.41s; }
nav.menu-open .nav-logo, nav.menu-open .nav-actions { opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
body.menu-open { overflow: hidden; }

.nav-logo {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.nav-logo img { height: 40px; }

.nav-actions { display: flex; gap: 20px; align-items: center; }
.nav-actions a { display: flex; }

.nav-actions svg {
  width: 18px; height: 18px;
  stroke: var(--text); stroke-width: 1.4; fill: none;
}

/* ── PAGE HEADER ── */
.page-header {
  padding: 56px 48px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.page-header h1 {
  font-family: 'EB Garamond', serif;
  font-size: clamp(32px, 3.5vw, 48px);
  font-weight: 400;
}

.page-header h1 em { font-style: italic; }

.filter-bar {
  display: flex;
  gap: 24px;
  align-items: center;
}

.filter-bar span {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

.filter-bar select {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: var(--text);
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 6px 20px 6px 0;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238A8378' stroke-width='1.2'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 2px center;
}

/* ── PRODUCT GRID ── */
.shop-grid {
  padding: 40px 48px 100px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  row-gap: 40px;
}

.product-card { cursor: pointer; }

.product-card .img-wrap {
  position: relative;
  overflow: hidden;
  background: var(--bg-warm);
  aspect-ratio: 3/4;
}

.product-card .img-wrap .img-primary,
.product-card .img-wrap .img-hover {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.5s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.product-card .img-wrap .img-hover { opacity: 0; }
.product-card:hover .img-wrap .img-primary { opacity: 0; }
.product-card:hover .img-wrap .img-hover { opacity: 1; transform: scale(1.03); }

.product-card .quick-add {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--text);
  color: var(--bg);
  text-align: center;
  padding: 13px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(100%);
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 2;
}

.product-card:hover .quick-add { opacity: 1; transform: translateY(0); }

.product-card .meta { padding-top: 14px; }

.product-card .meta h3 { font-size: 13px; font-weight: 400; }

.product-card .meta .detail {
  font-size: 11px;
  color: var(--muted);
  font-weight: 300;
  margin-top: 2px;
}

.product-card .meta .price {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  margin-top: 6px;
}

/* ── FOOTER ── */
footer {
  background: var(--bg);
  color: var(--muted);
  padding: 40px 48px 24px;
  border-top: 1px solid var(--border);
}

.footer-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 48px;
  padding-bottom: 24px;
}

.footer-cols { display: flex; gap: 56px; }

.footer-brand {
  font-family: 'EB Garamond', serif;
  font-size: 16px;
  color: var(--text);
}

footer h4 {
  font-size: 9px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(28,26,23,0.3); margin-bottom: 10px;
}

footer .fc a {
  display: block; font-size: 12px; font-weight: 300;
  margin-bottom: 6px; color: var(--muted); transition: color 0.3s;
}

footer .fc a:hover { color: var(--text); }

.footer-bottom {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 16px; border-top: 1px solid var(--border);
  font-size: 10px; color: rgba(28,26,23,0.3);
}

.footer-bottom .socials { display: flex; gap: 20px; }

.footer-bottom .socials a {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); transition: color 0.3s;
}

.footer-bottom .socials a:hover { color: var(--text); }

/* ── REVEAL ── */
.reveal {
  opacity: 0; transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal.v { opacity: 1; transform: translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .page-header, .shop-grid { padding-left: 32px; padding-right: 32px; }
  nav { padding: 0 32px; }
  .shop-grid { grid-template-columns: repeat(3, 1fr); }
  .footer-cols { gap: 40px; }
}

@media (max-width: 640px) {
  .page-header, .shop-grid { padding-left: 20px; padding-right: 20px; }
  nav { padding: 0 20px; height: 56px; }
  .nav-logo img { height: 24px; }
  .shop-grid { grid-template-columns: 1fr 1fr; gap: 12px; row-gap: 28px; }
  .product-card .quick-add { display: none; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
  .footer-top { flex-direction: column; gap: 24px; }
  .footer-cols { flex-wrap: wrap; gap: 32px; }
  footer { padding: 32px 20px 16px; }
  .footer-bottom { flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>

<button class="nav-menu-toggle" id="menuToggle" aria-label="Menu"><svg viewBox="0 0 24 24"><line class="h" x1="3" y1="12" x2="21" y2="12"/><line class="v" x1="12" y1="3" x2="12" y2="21"/></svg></button>
<nav>
  <div class="nav-menu-toggle-spacer"></div>
  <a href="index.html" class="nav-logo">
    <img src="https://countrysidestaples.com/cdn/shop/files/6_by_150_logo.png?v=1748844280&width=500" alt="Countryside Staples">
  </a>
  <div class="nav-actions">
    <a href="#" class="search-link"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></a>
    <a href="account.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/></svg></a>
    <a href="#" class="cart-link"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg></a>
  </div>
</nav>

<div class="nav-overlay" id="menuDropdown">
  <div class="nav-overlay-inner">
    <a href="shop.html">All</a>
    <a href="shop.html?category=hats">Hats</a>
    <a href="shop.html?category=tops">Tops</a>
    <a href="shop.html?category=hoodies">Hoodies</a>
    <a href="shop.html?category=bottoms">Bottoms</a>
    <a href="shop.html?filter=bestsellers">Best Sellers</a>
    <a href="index.html#lookbook">This Season</a>
    <a href="about.html">Our Story</a>
    <a href="account.html">Account</a>
  </div>
</div>

<div class="page-header">
  <h1>All <em>Products</em></h1>
  <div class="filter-bar">
    <span id="productCount"></span>
    <select id="sortSelect">
      <option value="featured">Sort by: Featured</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="newest">Newest</option>
    </select>
  </div>
</div>

<div class="shop-grid" id="shopGrid"></div>

<footer>
  <div class="footer-top">
    <div class="footer-brand">Countryside Staples</div>
    <div class="footer-cols">
      <div class="fc"><h4>Shop</h4><a href="shop.html">All</a><a href="shop.html">Tees</a><a href="shop.html">Hats</a><a href="shop.html">Sweatsuits</a></div>
      <div class="fc"><h4>Company</h4><a href="about.html">Our Story</a><a href="index.html#lookbook">Lookbook</a><a href="#">Stockists</a></div>
      <div class="fc"><h4>Help</h4><a href="#">Shipping</a><a href="#">Size Guide</a><a href="#">Contact</a></div>
    </div>
  </div>
  <div class="footer-bottom"><span>&copy; 2025 Countryside Staples</span><div class="socials"><a href="#">Instagram</a><a href="#">TikTok</a></div></div>
</footer>

<script src="cart.js"></script>
<script>
const toggle = document.getElementById('menuToggle');
const dropdown = document.getElementById('menuDropdown');
const navEl = document.querySelector('nav');
function setMenu(open) {
  toggle.classList.toggle('open', open);
  dropdown.classList.toggle('open', open);
  navEl.classList.toggle('menu-open', open);
  document.body.classList.toggle('menu-open', open);
}
toggle.addEventListener('click', () => setMenu(!dropdown.classList.contains('open')));
dropdown.querySelectorAll('a').forEach(a => a.addEventListener('click', () => setMenu(false)));
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setMenu(false); });

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('v'); obs.unobserve(e.target); } });
}, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });

function cardHTML(p) {
  const price = '$' + (p.price_cents / 100).toFixed(0);
  const hover = p.image_hover || p.image_primary;
  return `<a href="product.html?slug=${encodeURIComponent(p.slug)}" class="product-card reveal">
    <div class="img-wrap">
      <img class="img-primary" src="${p.image_primary}" alt="${p.name}">
      <img class="img-hover" src="${hover}" alt="${p.name}">
      <div class="quick-add" data-slug="${p.slug}" data-name="${p.name}" data-detail="${p.detail || ''}" data-price="${p.price_cents}" data-image="${p.image_primary}" data-sizes='${p.sizes || "[]"}'>Quick Add</div>
    </div>
    <div class="meta"><h3>${p.name}</h3><div class="detail">${p.detail}</div><div class="price">${price}</div></div>
  </a>`;
}

let allProducts = [];

function renderProducts(products) {
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = products.map(cardHTML).join('');
  document.getElementById('productCount').textContent = products.length + ' products';
  grid.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

function sortProducts(key) {
  const sorted = [...allProducts];
  if (key === 'price-asc') sorted.sort((a, b) => a.price_cents - b.price_cents);
  else if (key === 'price-desc') sorted.sort((a, b) => b.price_cents - a.price_cents);
  else if (key === 'newest') sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  else sorted.sort((a, b) => a.sort_order - b.sort_order);
  renderProducts(sorted);
}

document.getElementById('sortSelect').addEventListener('change', (e) => sortProducts(e.target.value));

fetch('/api/storefront/products')
  .then(r => r.json())
  .then(products => { allProducts = products; renderProducts(products); });
</script>
</body>
</html>
