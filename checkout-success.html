<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Countryside Staples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #F6F3EF; --text: #1C1A17; --muted: #8A8378; --accent: #9C8B72; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}
.success-box h1 {
  font-family: 'EB Garamond', serif;
  font-size: 36px;
  font-weight: 400;
  margin-bottom: 12px;
}
.success-box p {
  font-size: 14px;
  font-weight: 300;
  color: var(--muted);
  line-height: 1.6;
  max-width: 400px;
  margin-bottom: 32px;
}
.success-box a {
  display: inline-block;
  padding: 14px 32px;
  background: var(--text);
  color: var(--bg);
  text-decoration: none;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  transition: opacity 0.2s;
}
.success-box a:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="success-box">
  <h1>Thank <em>you</em></h1>
  <p>Your order has been placed. You'll receive a confirmation email shortly.</p>
  <a href="index.html">Continue Shopping</a>
</div>
<script>
// Clear cart on successful checkout
localStorage.removeItem('css_cart');
</script>
</body>
</html>
